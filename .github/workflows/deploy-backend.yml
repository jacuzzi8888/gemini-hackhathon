name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: aura-proxy

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        region: [us-central1, europe-west4]
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}'
          service_account: '${{ secrets.GCP_SA_EMAIL }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Authorize Docker (${{ matrix.region }})
        run: gcloud auth configure-docker ${{ matrix.region }}-docker.pkg.dev --quiet

      - name: Build and Push Container (${{ matrix.region }})
        run: |-
          docker build -t ${{ matrix.region }}-docker.pkg.dev/${{ env.PROJECT_ID }}/aura-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} ./server
          docker push ${{ matrix.region }}-docker.pkg.dev/${{ env.PROJECT_ID }}/aura-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run (${{ matrix.region }})
        run: |-
          gcloud run deploy ${{ env.SERVICE_NAME }}-${{ matrix.region }} \
            --image ${{ matrix.region }}-docker.pkg.dev/${{ env.PROJECT_ID }}/aura-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ matrix.region }} \
            --allow-unauthenticated \
            --port 8080 \
            --timeout=3600 \
            --no-cpu-throttling \
            --min-instances=1 \
            --concurrency=200 \
            --memory=512Mi \
            --set-env-vars="GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}" \
            --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest"
